name: Update Notion Cache

on:
  schedule:
    - cron: '0 0 * * *'  # Runs at 00:00 UTC daily
  workflow_dispatch:      # Allows manual trigger

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests tenacity

    - name: Create update_cache.py
      run: |
        cat > update_cache.py << 'EOL'
        import os
        import json
        import time
        import requests
        from requests.adapters import HTTPAdapter
        from urllib3.util.retry import Retry
        from pathlib import Path

        NOTION_TOKEN = os.environ.get('NOTION_TOKEN')
        if not NOTION_TOKEN:
            raise ValueError("NOTION_TOKEN environment variable is required")

        SUBJECT_DATABASE_ID      = '2674b67cbdf84a11a057a29cc24c524f'
        PHARMACOLOGY_DATABASE_ID = '9ff96451736d43909d49e3b9d60971f8'
        ETG_DATABASE_ID          = '22282971487f4f559dce199476709b03'
        ROTATION_DATABASE_ID     = '69b3e7fdce1548438b26849466d7c18e'
        TEXTBOOKS_DATABASE_ID    = '13d5964e68a480bfb07cf7e2f1786075'
        GUIDELINES_DATABASE_ID   = '13d5964e68a48056b40de8148dd91a06'
        SYNCED_EXTRA_DATABASE_ID = '2dc5964e68a480909c4ac1dc169b16fb'

        USES_FOR_SEARCH = {
            SUBJECT_DATABASE_ID,
            PHARMACOLOGY_DATABASE_ID,
            ETG_DATABASE_ID,
            ROTATION_DATABASE_ID,
            TEXTBOOKS_DATABASE_ID,
            GUIDELINES_DATABASE_ID,
        }

        TIMEOUT = 120  # seconds — large databases need time

        def make_session():
            """Create a requests session with built-in retry/backoff at the transport level."""
            session = requests.Session()
            session.headers.update({
                "Authorization": f"Bearer {NOTION_TOKEN}",
                "Notion-Version": "2022-06-28",
                "Content-Type": "application/json",
            })
            retry = Retry(
                total=5,
                backoff_factor=2,          # 2, 4, 8, 16, 32 s between retries
                status_forcelist=[429, 500, 502, 503, 504],
                allowed_methods=["POST"],
                raise_on_status=False,
            )
            adapter = HTTPAdapter(max_retries=retry)
            session.mount("https://", adapter)
            return session

        class NotionCache:
            def __init__(self):
                self.cache_dir = Path("cache")
                self.cache_dir.mkdir(exist_ok=True)
                self.session = make_session()

            def fetch_pages_batch(self, database_id: str, start_cursor: str = None, use_for_search: bool = True) -> dict:
                if use_for_search:
                    payload = {
                        "filter": {
                            "property": "For Search",
                            "formula": {"checkbox": {"equals": True}}
                        },
                        "page_size": 100,
                    }
                else:
                    payload = {"page_size": 100}

                if start_cursor:
                    payload["start_cursor"] = start_cursor

                for attempt in range(1, 6):
                    try:
                        response = self.session.post(
                            f"https://api.notion.com/v1/databases/{database_id}/query",
                            json=payload,
                            timeout=TIMEOUT,
                        )
                        response.raise_for_status()
                        return response.json()
                    except Exception as e:
                        print(f"  Attempt {attempt}/5 failed: {type(e).__name__}: {e}")
                        if attempt < 5:
                            wait = 2 ** attempt
                            print(f"  Waiting {wait}s before retry...")
                            time.sleep(wait)
                        else:
                            raise

            def update_cache(self, database_id: str):
                use_for_search = database_id in USES_FOR_SEARCH
                pages = []
                has_more = True
                start_cursor = None
                batch = 0

                while has_more:
                    batch += 1
                    print(f"  Fetching batch {batch}...")
                    data = self.fetch_pages_batch(database_id, start_cursor, use_for_search)
                    pages.extend(data['results'])
                    has_more = data.get('has_more', False)
                    start_cursor = data.get('next_cursor')
                    print(f"  Batch {batch}: {len(data['results'])} pages (total: {len(pages)})")
                    if has_more:
                        time.sleep(0.5)  # gentle rate-limit buffer between batches

                cache_path = self.cache_dir / f"{database_id}.json"
                with cache_path.open('w', encoding='utf-8') as f:
                    json.dump({'version': 1, 'timestamp': time.time(), 'pages': pages}, f)
                print(f"  Saved {len(pages)} pages → {cache_path}")

        def update_notion_cache():
            notion_cache = NotionCache()
            databases = [
                (SUBJECT_DATABASE_ID,      "Subjects"),
                (PHARMACOLOGY_DATABASE_ID, "Pharmacology"),
                (ETG_DATABASE_ID,          "eTG"),
                (ROTATION_DATABASE_ID,     "Rotation"),
                (TEXTBOOKS_DATABASE_ID,    "Textbooks"),
                (GUIDELINES_DATABASE_ID,   "Guidelines"),
                (SYNCED_EXTRA_DATABASE_ID, "Synced Extra"),
            ]

            for database_id, name in databases:
                print(f"\n--- Updating {name} ---")
                notion_cache.update_cache(database_id)
                print(f"--- Done: {name} ---")
                time.sleep(3)

        if __name__ == "__main__":
            update_notion_cache()
        EOL

    - name: Update cache
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      uses: nick-fields/retry@v2
      with:
        timeout_minutes: 30
        max_attempts: 3
        command: python update_cache.py
        on_retry_command: |
          echo "Retry attempt in progress..."
          sleep 10

    - name: Commit and push if changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add cache/
        git commit -m "Update cache" -a || exit 0
        git push
